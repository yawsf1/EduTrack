<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../media/EduTrack.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="inscconn.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>EduTrack</title>
</head>
<body>
    <div id="everything">
            <video id="bgvideo" loop autoplay muted playsinline>
                <source src="media/4K 2160p Blue Ambient Waving Lines Motion Background - AA-VFX (1080p, h264).mp4" type="video/mp4">
            </video>
        <nav id="navigation">
            <ul id="ul2">
                <li><h1>EduTrack</h1></li>
                <li>
                    <div id="divsearch">
                        <input type="search" name="search" placeholder="Recherche ...">
                        <button name="search"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </li>
                <li>
                    <a id="btnhome" href="index.html">Accueil</a>
                    <a id="btnconn" href="login.html">Se connecter</a>
                </li>
            </ul>
        </nav>
        <div id="content">
                <form id="calculs" action="#" method="post">
                    <div id="gendercont2" class="gendercont">
                        <div class="firstinput">
                            <label for="nom">Nom: </label>
                            <input type="text" required placeholder="Entrez votre nom ..." id="nom" name="nom" class="small">
                        </div>
                        <div class="firstinput">
                            <label for="prenom">Prenom: </label>
                            <input type="text" required placeholder="Entrez votre prenom ..." id="prenom" name="prenom" class="small">
                        </div>
                    </div>
                    <div class="secondinput">
                        <label for="email">Votre Email: </label>
                        <input type="email" required id="email" placeholder="Ex. username@domainnom.com" minlength="20" maxlength="30" name="email" class="long">
                    </div>

                    <div class="secondinput">
                        <label for="pass">Créez un nouveau mot de passe </label>
                        <input type="password" required id="pass" placeholder="********" minlength="8" maxlength="25" name="pass" class="long">
                    </div>
                    <div class="secondinput">
                        <label for="cpass">Confirmez votre mot de passe</label><br>
                        <input type="password" required id="cpass" placeholder="********" name="cpass" class="long">
                    </div>
                    <div  class="gendercont">
                        <input type="hidden" id="selected" name="selected">
                        <h3 class="gender" required data-value="femme">Femme</h3>
                        <h3 class="gender" required data-value="homme">Homme</h3>
                    </div>
                    <input type="hidden" name="scrf">
                    <button id="enregistrer2" type="submit">S'inscrire <i class="fa-solid fa-arrow-right"></i></button>
                </form>
        </div>
    </div>
    <script>
    let selectedInput = document.getElementById('selected');
    let genders = document.querySelectorAll('.gender');

    genders.forEach(el => {
        el.addEventListener('click', () => {
            genders.forEach(g => {
                g.style.backgroundColor = '#C5C6C7';
                g.style.color = '#1F2833';
                g.style.transition = 'color 0.3s, background-color 0.3s';
            });
            el.style.backgroundColor = '#45A29E';
            el.style.color = '#1F2833';
            el.style.transition = 'color 0.3s, background-color 0.3s';
            selectedInput.value = el.dataset.value;
        });
    });
    </script>
</body>
</html>
